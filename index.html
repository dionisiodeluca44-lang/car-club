<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A premium car concierge membership for maintenance, detailing, storage, tuning, pickup, delivery, and collection management."
    />
    <meta name="theme-color" content="#050505" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Car Club | Vehicle Concierge Membership</title>
  </head>
  <body>
    <form name="membership-lead" method="POST" action="/" netlify data-netlify="true" netlify-honeypot="bot-field" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="membership-lead" />
      <input name="bot-field" />
      <input name="fullName" />
      <input name="phone" />
      <input name="email" />
      <input name="city" />
      <input name="vehicleCount" />
      <input name="year" />
      <input name="make" />
      <input name="model" />
      <input name="mileage" />
      <input name="vehicleType" />
      <input name="usage" />
      <input name="membership" />
      <input name="services" />
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
