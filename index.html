<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="White Glove Concierge is a premium collection management and vehicle concierge app for collectors and multi-car owners."
    />
    <meta name="theme-color" content="#050505" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>White Glove Concierge | Collection Management</title>
  </head>
  <body>
    <form name="membership-lead" method="POST" action="/" netlify data-netlify="true" netlify-honeypot="bot-field" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="membership-lead" />
      <input name="bot-field" />
      <input name="fullName" />
      <input name="phone" />
      <input name="email" />
      <input name="city" />
      <input name="vehicleCount" />
      <input name="year" />
      <input name="make" />
      <input name="model" />
      <input name="mileage" />
      <input name="vehicleType" />
      <input name="usage" />
      <input name="membership" />
      <input name="services" />
      <textarea name="message"></textarea>
    </form>
    <form name="service-request" method="POST" action="/" netlify data-netlify="true" netlify-honeypot="bot-field" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="service-request" />
      <input name="bot-field" />
      <input name="memberName" />
      <input name="memberEmail" />
      <input name="vehicle" />
      <input name="service" />
      <input name="date" />
      <input name="time" />
      <textarea name="notes"></textarea>
    </form>
    <div id="root">
      <main style="min-height:100vh;display:grid;align-items:center;padding:2rem;background:#050505;color:#f8f5ed;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
        <section style="max-width:760px;">
          <p style="color:#e5c879;font-weight:800;letter-spacing:.12em;text-transform:uppercase;">White Glove Concierge</p>
          <h1 style="margin:.2rem 0 1rem;font-size:clamp(2.4rem,8vw,5rem);line-height:.95;">Collection Management</h1>
          <p style="max-width:620px;color:rgba(255,255,255,.74);font-size:1.1rem;line-height:1.7;">
            Loading the member app. If this message stays on screen, refresh the page or open it in a new browser tab.
          </p>
          <a href="/privacy.html" style="display:inline-block;margin-top:1rem;color:#e5c879;font-weight:800;">Privacy Policy</a>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
