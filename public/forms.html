<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex" />
    <title>White Glove Concierge Forms</title>
  </head>
  <body>
    <form name="membership-lead" method="POST" action="/" netlify data-netlify="true" netlify-honeypot="bot-field" data-netlify-honeypot="bot-field">
      <input type="hidden" name="form-name" value="membership-lead" />
      <input name="bot-field" />
      <input name="fullName" />
      <input name="phone" />
      <input name="email" />
      <input name="city" />
      <input name="vehicleCount" />
      <input name="year" />
      <input name="make" />
      <input name="model" />
      <input name="mileage" />
      <input name="vehicleType" />
      <input name="usage" />
      <input name="membership" />
      <input name="services" />
      <textarea name="message"></textarea>
    </form>
    <form name="service-request" method="POST" action="/" netlify data-netlify="true" netlify-honeypot="bot-field" data-netlify-honeypot="bot-field">
      <input type="hidden" name="form-name" value="service-request" />
      <input name="bot-field" />
      <input name="memberName" />
      <input name="memberEmail" />
      <input name="vehicle" />
      <input name="vehicleId" />
      <input name="vehicleClass" />
      <input name="service" />
      <input name="serviceOption" />
      <input name="date" />
      <input name="time" />
      <input name="paymentMode" />
      <input name="paymentTitle" />
      <input name="paymentAmount" />
      <input name="paymentNote" />
      <input name="paymentMethod" />
      <textarea name="notes"></textarea>
    </form>
  </body>
</html>
